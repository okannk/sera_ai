version: "3.8"

# Sera AI — Grafana / Loki / Promtail Stack
#
# Başlatmak için:
#   cd grafana/
#   docker compose up -d
#
# Grafana: http://localhost:3000  (admin / admin)
# Loki:    http://localhost:3100
#
# Sera AI API'nin /metrics endpoint'i için:
#   API: http://host.docker.internal:5000/metrics
#   (Linux'ta: host-gateway ayarı gerekli)

services:

  loki:
    image: grafana/loki:2.9.0
    container_name: sera_loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - sera_net

  promtail:
    image: grafana/promtail:2.9.0
    container_name: sera_promtail
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      # sera_system.jsonl'ın bulunduğu dizini mount edin:
      - ../sera_system.jsonl:/var/log/sera_system.jsonl:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - sera_net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: sera_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - sera_net
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Linux için API erişimi

volumes:
  loki_data:
  grafana_data:

networks:
  sera_net:
    driver: bridge
