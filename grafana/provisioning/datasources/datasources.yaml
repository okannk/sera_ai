apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 1000

  - name: Prometheus
    type: prometheus
    access: proxy
    # Sera AI API /metrics endpoint
    url: http://host.docker.internal:5000
    editable: false
    jsonData:
      httpMethod: GET
      # /metrics path'i Prometheus scrape config'de belirtilir
      # Grafana datasource URL'sine /metrics eklenmiş kabul edilir
