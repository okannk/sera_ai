# ══════════════════════════════════════════════════════════════
# SERA AI — Sistem Konfigürasyonu
# Versiyon: 0.2  |  Öncelik: ortam değişkeni > bu dosya > kod varsayılanı
# ══════════════════════════════════════════════════════════════
#
# Donanım değiştirmek için:
#   saha:   esp32_s3      → gerçek ESP32-S3 node'ları (MQTT)
#   saha:   mock          → test/demo modu (donanım gerekmez)
#
#   merkez: raspberry_pi  → Raspberry Pi 5'te tam kontrol döngüsü
#   merkez: mock          → test modu
#
# Gizli değerler (token, şifre, API key) BURADA YOK.
# Bunlar .env dosyasından gelir → ortam değişkenleri olarak okunur.

# ── Donanım Seçimi ────────────────────────────────────────────
donanim:
  saha:   mock           # esp32_s3 | mock
  merkez: mock           # raspberry_pi | mock

# ── Sera Tanımları ────────────────────────────────────────────
sera:
  seralar:
    - id:           s1
      isim:         "Sera A"
      bitki:        Domates
      alan_m2:      500
      node_id:      esp32_sera_a   # ESP32-S3 MQTT kimliği
      # saha_donanim: esp32_s3     # Sadece bu serayı override etmek için
      sensorler:
        - tip:    sht31             # Sıcaklık + nem (I2C 0x44)
          adres:  0x44
        - tip:    mh_z19c          # CO₂ UART
          port:   /dev/ttyS0
        - tip:    kapasitif_nem    # Toprak nem (ADS1115 kanal 0)
          kanal:  0
        - tip:    bh1750           # Işık (I2C 0x23)
          adres:  0x23

    - id:           s2
      isim:         "Sera B"
      bitki:        Biber
      alan_m2:      300
      node_id:      esp32_sera_b
      sensorler:
        - tip:    sht31
          adres:  0x44
        - tip:    mh_z19c
          port:   /dev/ttyS0
        - tip:    kapasitif_nem
          kanal:  0
        - tip:    bh1750
          adres:  0x23

    - id:           s3
      isim:         "Sera C"
      bitki:        Marul
      alan_m2:      200
      node_id:      esp32_sera_c
      sensorler:
        - tip:    sht31
          adres:  0x44
        - tip:    mh_z19c
          port:   /dev/ttyS0
        - tip:    kapasitif_nem
          kanal:  0
        - tip:    bh1750
          adres:  0x23

# ── MQTT Bağlantısı (ESP32-S3 iletişimi) ─────────────────────
# Kullanıcı/şifre .env'den: MQTT_KULLANICI, MQTT_SIFRE
# Ortam değişkeni override: SERA_MQTT_HOST, SERA_MQTT_PORT
mqtt:
  host:  localhost
  port:  1883
  aktif: false    # true → gerçek Mosquitto broker (paho-mqtt gerekli)

# ── Bitki Profilleri ──────────────────────────────────────────
bitki_profilleri:
  Domates:
    min_T:     15       # Minimum güvenli sıcaklık (°C)
    max_T:     30       # Maksimum güvenli sıcaklık
    opt_T:     23       # Optimal sıcaklık
    min_H:     60       # Minimum nem (%)
    max_H:     85       # Maksimum nem
    opt_CO2:   1000     # Optimal CO₂ (ppm)
    hasat_gun: 90       # Ortalama hasat süresi
    min_isik:  2000     # Minimum ışık (lux)
    opt_isik:  20000    # Optimal ışık
    max_isik:  50000    # Maksimum ışık
    min_pH:    5.8      # Minimum pH
    opt_pH:    6.3      # Optimal pH
    max_pH:    6.8      # Maksimum pH
    min_EC:    2.0      # Minimum EC (mS/cm)
    opt_EC:    3.0      # Optimal EC
    max_EC:    4.0      # Maksimum EC

  Biber:
    min_T:     18
    max_T:     32
    opt_T:     25
    min_H:     55
    max_H:     80
    opt_CO2:   900
    hasat_gun: 85
    min_isik:  1500
    opt_isik:  15000
    max_isik:  40000
    min_pH:    5.8
    opt_pH:    6.3
    max_pH:    6.8
    min_EC:    1.8
    opt_EC:    2.5
    max_EC:    3.5

  Marul:
    min_T:     10
    max_T:     22
    opt_T:     16
    min_H:     65
    max_H:     85
    opt_CO2:   800
    hasat_gun: 45
    min_isik:  500
    opt_isik:  8000
    max_isik:  20000
    min_pH:    5.5
    opt_pH:    6.0
    max_pH:    6.5
    min_EC:    0.8
    opt_EC:    1.2
    max_EC:    2.0

# ── Sistem Parametreleri ──────────────────────────────────────
sistem:
  sensor_interval_sn: 2.5    # Sensör okuma periyodu (saniye)
  cb_hata_esigi:      5      # Circuit breaker açılma eşiği (hata sayısı)
  cb_recovery_sn:     60     # Circuit breaker recovery süresi (saniye)
  log_dosyasi:        sera_system.jsonl   # JSONL format, Grafana/Loki uyumlu
  db_yolu:            sera_data.db        # SQLite veritabanı dosyası

# ── REST API ──────────────────────────────────────────────────
# API key .env'den okunur: SERA_API_KEY
# api_key_env: hangi env değişkenine bakılacağını belirtir
api:
  aktif:       true
  port:        5000
  api_key_env: SERA_API_KEY   # Bu env var tanımlıysa auth aktif olur

# ── Görüntü İşleme / Hastalık Tespiti ────────────────────────
# Kamera görüntüleri ile bitki hastalığı tespiti.
# Model eğitimi: python -m sera_ai.goruntu.egitim --n 500
goruntu:
  aktif:             false     # true → kontrol döngüsüne entegre edilir
  kamera:            mock      # mock | esp32_cam
  tespit:            mock      # mock | model
  kontrol_aralik_sn: 30        # Her kaç saniyede bir tespit yapılsın
  model_yolu:        models/hastalik_tespiti.pkl
  guven_esigi:       0.60      # Bu değerin altı anomali sayılır
  seralar:           []        # Kamerası olan seralar
  # Örnek:
  # seralar:
  #   - id:  s1
  #     url: http://192.168.1.201/capture   # ESP32-CAM endpoint (esp32_cam için)
  #   - id:  s2
  #     url: http://192.168.1.202/capture

# ── Intelligence / Optimizer ──────────────────────────────────
# ⚠️  DONANIM BAĞLARKEN KONTROL LİSTESİ:
#   1. donanim.saha:   mock  →  esp32_s3
#   2. donanim.merkez: mock  →  raspberry_pi
#   3. optimizer: rl_ajan    →  kural_motoru  (RL henüz sahada test edilmedi!)
#   4. mqtt.aktif: false     →  true
#   5. .env dosyasına MQTT_KULLANICI, MQTT_SIFRE ekle
intelligence:
  optimizer:   rl_ajan        # kural_motoru | ml_motor | rl_ajan
  model_dizin: models         # Eğitilmiş .pkl dosyalarının dizini

# ── Bildirimler ───────────────────────────────────────────────
# Tüm token/şifreler .env dosyasından gelir
bildirim:
  bastirma_dk:  10        # Aynı alarm için minimum bekleme süresi (dakika)
  sabah_raporu: "07:00"   # Günlük özet rapor saati (HH:MM)

  # Hangi kanallar aktif?
  telegram_aktif:  false   # true yapmak için TELEGRAM_TOKEN + TELEGRAM_CHAT_ID gerekli
  whatsapp_aktif:  false   # true yapmak için Twilio env değişkenleri gerekli
  eposta_aktif:    false   # true yapmak için EMAIL_* env değişkenleri gerekli

  # Env var adları (değerlerin kendisi değil — güvenlik)
  telegram_token_env:   TELEGRAM_TOKEN
  telegram_chat_id_env: TELEGRAM_CHAT_ID
